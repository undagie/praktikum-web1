<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <nav class="navbar bg-primary navbar-dark">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">Penggajian</a>
        </div>
    </nav>
    <div class="container-fluid">
        <form action="">
            <div>
                <label for="nik" class="form-label">NIK: </label>
                <input type="text" class="form-control" id="nik" name="id" size="10" maxlength="10" placeholder="Misal: 123" required>
            </div>
            <div>
                <label for="nama" class="form-label">Nama: </label>
                <input type="text" class="form-control" id="nama" name="nama" placeholder="Misal: Fulan" required autocomplete="off">
            </div>

            <div>
                <label for="tanggal_mulai" class="form-label">Tanggal mulai</label>
                <input type="date" class="form-control" id="tanggal_mulai" name="tanggal_mulai" min="2010-01-01" max="2025-12-31" required>
            </div>

            <div>
                <label for="gaji_pokok" class="form-label">Gaji Pokok</label>
                <input type="number" class="form-control" id="gaji_pokok" name="gaji_pokok" min="1000000" max="50000000" step="1000">
            </div>

            <div>
            <label for="" class="form-label">Status Karyawan</label>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="status_karyawan" id="tetap" value="TETAP">
                <label for="tetap" class="form-check-label">TETAP</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="status_karyawan" id="kontrak" value="KONTRAK">
                <label for="kontrak" class="form-check-label">KONTRAK</label>
            </div>
            <div class="form-check">
                <input type="radio" class="form-check-input" name="status_karyawan" id="magang" value="MAGANG">
                <label for="magang" class="form-check-label">MAGANG</label>
            </div>

            </div>

            <button type="submit" class="btn btn-success" id="btn_submit" name="btn_submit" value="Submit">
                <i class="fa fa-save"></i> Submit
            </button>
            <button type="reset" class="btn btn-warning" id="btn_reset" name="btn_reset" value="Reset">
                <i class="fa fa-arrows-rotate"></i> Reset
            </button>
        </form>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>

</html>
